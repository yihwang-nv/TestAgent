# Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled — RTX PRO 6000 Blackwell (96 GB VRAM)
# ---------------------------------------------------------------
# Inference engine: vLLM (PagedAttention, continuous batching)
# Model is ~19 GB bf16 — fits easily on 96 GB VRAM.
#
# Quantization options (only needed on smaller GPUs):
#   none (bf16): ~19 GB  ← default, best quality
#   8bit:        ~10 GB  (vLLM bitsandbytes)
#   awq:         ~5  GB  (needs pre-quantized AWQ variant)
# ---------------------------------------------------------------

model:
  hf_repo: "Jackrong/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled"
  local_dir: "/home/scratch.yihwang_gpu_1/small_model/models/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled"

  # Quantization: "none" | "8bit" | "awq"
  quantization: "none"

  # dtype: bfloat16 is native for Blackwell and preferred
  torch_dtype: "bfloat16"

vllm:
  # Max context length (model supports up to 32 768; set lower to save KV cache)
  max_model_len: 8192

  # Fraction of GPU VRAM to allocate for model + KV cache (0.0–1.0)
  gpu_memory_utilization: 0.90

  # Number of GPUs for tensor parallelism (1 for single GPU)
  tensor_parallel_size: 1

  # Name exposed on /v1/models
  served_model_name: "qwen3.5-9b"

  # Trust remote code (required for Qwen3 chat template)
  trust_remote_code: true

generation:
  # Context: capped by vllm.max_model_len above
  max_new_tokens: 2048

  # Qwen3.5 recommended sampling params
  temperature: 0.6
  top_p: 0.95
  top_k: 40
  repetition_penalty: 1.05
